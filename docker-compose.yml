services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ignitehub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ignitehub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ignitehub_secret}
      POSTGRES_DB: ${DB_NAME:-ignitehub}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ignitehub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ignitehub_net

  # ── NestJS API ───────────────────────────────────────────────────────────────
  api:
    container_name: ignitehub_api
    build:
      context: ./API
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./API/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ignitehub}
      DB_PASSWORD: ${DB_PASSWORD:-ignitehub_secret}
      DB_NAME: ${DB_NAME:-ignitehub}
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ignitehub_net

volumes:
  pgdata:
    driver: local

networks:
  ignitehub_net:
    driver: bridge
